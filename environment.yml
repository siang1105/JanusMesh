# Use conda-forge only for the toolchain to avoid multi-hour "Solving environment".
# PyTorch + CUDA 11.8 wheels come from pip (requirements-pytorch-cu118.txt).
name: janusmesh
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - setuptools
  - gcc_linux-64=11
  - gxx_linux-64=11
  - cmake
  - ninja
  - git
  - ffmpeg
  - pip:
      - -r requirements-pytorch-cu118.txt
      - -r requirements.txt
