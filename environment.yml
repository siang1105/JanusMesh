name: janusmesh
# Merged environment from:
#   - Trellis  (PyTorch 2.4.0, Python 3.10, CUDA 11.8)
#   - SyncTweedies (PyTorch 2.0.0, Python 3.8)
# Resolution strategy:
#   - Python:  3.10  (Trellis requirement; 3.8 code runs unchanged on 3.10)
#   - PyTorch: 2.4.0 (Trellis minimum; SyncTweedies upgraded from 2.0.0)
#   - diffusers: 0.25.0 (upgrade from SyncTweedies 0.19.3; API-compatible)
#   - transformers: 4.38.0 (upgrade from SyncTweedies 4.28.1)
#
# Optional CUDA extensions (xformers, flash-attn, diffoctreerast, spconv, etc.)
# are NOT listed here — install them via setup.sh after activating this env.

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python & PyTorch ────────────────────────────────────────────────────────
  - python=3.10
  - pytorch==2.4.0
  - torchvision==0.19.0
  - pytorch-cuda=11.8

  # ── System-level (conda-managed) ────────────────────────────────────────────
  - igl
  - pip
  - open3d=0.18.0
  - gcc_linux-64=11
  - gxx_linux-64=11
  - cmake 

  # ── pip packages ────────────────────────────────────────────────────────────
  - pip:
      # --- Core utilities ---
      - pillow
      - imageio==2.19.3
      - imageio-ffmpeg==0.4.7
      - tqdm
      - easydict
      - opencv-python-headless
      - ninja
      - rembg==2.0.67
      - onnxruntime==1.17.0
      - pyyaml==6.0.1
      - einops==0.7.0
      - natsort==8.4.0
      - psutil

      # --- Geometry / 3D ---
      - trimesh==4.0.8
      - xatlas==0.0.8
      - pyvista
      - pymeshfix
      - igraph
      - pymcubes==0.1.4
      - pymeshlab==2021.10
      - pygltflib==1.16.2
      - plyfile==0.8.1
      - pyquaternion==0.9.9
      - numpy-quaternion==2022.4.3

      # --- Diffusion / generative ---
      - diffusers==0.25.0
      - accelerate==0.25.0
      - safetensors==0.4.1

      # --- Vision / transformers ---
      - transformers==4.38.0
      - tokenizers==0.15.2
      - sentencepiece
      - ftfy==6.1.3

      # --- Rendering / visualization ---
      - mitsuba==3.5.0
      - drjit==0.4.4
      - plotly==5.18.0

      # --- CUDA utils ---
      - cupy-cuda11x==12.2.0

      # --- Data science / ML utilities ---
      - omegaconf==2.3.0
      - clean-fid==0.1.35
      - fvcore==0.1.5.post20221221
      - iopath==0.1.10
      - lpips
      - scikit-learn
      - pandas
      - matplotlib
      - tabulate==0.9.0
      - yacs==0.1.8
      - addict==2.4.0
      - huggingface-hub==0.20.3

      # --- Experiment tracking ---
      - wandb
      - tensorboard

      # --- Jupyter / notebook (optional but useful) ---
      - ipython
      - ipykernel
      - ipywidgets
      - jupyter_client
      - jupyter_core

      # --- Misc ---
      - packaging
      - requests
      - filelock
      - fsspec
      - networkx
      - sympy
      - mpmath
      - regex
      - typing_extensions
      - wrapt
      - portalocker
